{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="mb-3">Verify Email</h4>
        <form method="post">
          {{ form.csrf_token }}
          <div class="mb-3">{{ form.email.label }} {{ form.email(class="form-control") }}</div>
          <div class="mb-3">{{ form.code.label }} {{ form.code(class="form-control", placeholder="6-digit code") }}</div>
          <div class="d-grid">{{ form.submit(class="btn btn-success") }}</div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
