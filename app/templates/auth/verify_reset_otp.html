{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow-sm">

                <div class="card-body">

                    <h3 class="mb-3">
                        Verify OTP
                    </h3>

                    <form method="POST">

                        <input
                            type="hidden"
                            name="csrf_token"
                            value="{{ csrf_token() }}"
                        >

                        <input
                            type="text"
                            name="otp"
                            class="form-control mb-3"
                            placeholder="Enter OTP"
                            required
                        >

                        <button class="btn btn-success w-100">
                            Verify OTP
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
